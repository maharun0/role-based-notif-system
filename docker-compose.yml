services:
  server:
    build: ./server
    ports:
      - "8000:8000"
    volumes:
      - ./server/data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/app.db
      - LOG_LEVEL=INFO

  website:
    build: ./website
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
      - VITE_WS_URL=ws://localhost:8000/ws
    depends_on:
      - server
